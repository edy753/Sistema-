<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA SOLO LEVELING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --panel: rgba(20, 20, 30, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Boot Screen */
        #boot { position: fixed; inset: 0; background: black; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s; }
        .scanner { width: 120px; height: 120px; border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; animation: spin 1s linear infinite; filter: drop-shadow(0 0 10px var(--neon)); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* HUD Principal */
        #hud { padding: 20px; flex: 1; display: none; flex-direction: column; opacity: 0; transition: 1.5s; }
        header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; text-shadow: 0 0 10px var(--neon); }
        .lvl-tag { font-family: 'Orbitron'; color: var(--neon); font-size: 1.2rem; }
        
        .xp-bg { background: #222; height: 6px; margin: 10px 0; border-radius: 3px; overflow: hidden; }
        #xp-bar { background: var(--neon); height: 100%; width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--neon); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .card { background: var(--panel); border-left: 3px solid var(--neon); padding: 15px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1.8rem; font-weight: bold; font-family: 'Orbitron'; }

        .quest-box { background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); padding: 15px; border-radius: 5px; margin-bottom: 10px; }
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        .btn:active { background: var(--neon); color: black; }
    </style>
</head>
<body>

    <div id="boot">
        <div class="scanner"></div>
        <p id="boot-text" style="margin-top:20px; color:var(--neon); font-family:Orbitron; letter-spacing:2px;">SISTEMA CARREGANDO...</p>
    </div>

    <main id="hud">
        <header>
            <div class="lvl-tag">JOGADOR: JIN-WOO <span id="lvl-display" style="float:right">LV. 01</span></div>
            <div class="xp-bg"><div id="xp-bar"></div></div>
            <div style="font-size:0.7rem; color:#aaa">XP ATUAL: <span id="xp-num">0</span> / 100</div>
        </header>

        <div class="grid">
            <div class="card"><div class="label">Força (STR)</div><div class="val" id="str-val">10</div></div>
            <div class="card"><div class="label">Inteligência (INT)</div><div class="val" id="int-val">10</div></div>
        </div>

        <p style="font-family:Orbitron; font-size:0.8rem; margin-bottom:10px; color:var(--neon)">MISSÕES ATIVAS</p>
        
        <div class="quest-box" style="display:flex; justify-content:space-between; align-items:center;">
            <div><div class="label" style="color:var(--neon)">DIÁRIA</div><div style="font-size:0.9rem">Treino Físico</div></div>
            <button class="btn" onclick="addXP(25, 'str')">+25 XP</button>
        </div>

        <div class="quest-box" style="display:flex; justify-content:space-between; align-items:center; border-color: #a333ff">
            <div><div class="label" style="color:#a333ff">ESTUDO</div><div style="font-size:0.9rem">Leitura Focada</div></div>
            <button class="btn" onclick="addXP(30, 'int')" style="border-color:#a333ff; color:#a333ff">+30 XP</button>
        </div>

        <div style="margin-top:auto; display:flex; justify-content:space-between; padding-bottom:10px">
            <button class="btn" style="width:48%" onclick="alert('Inventário Vazio')">INVENTÁRIO</button>
            <button class="btn" style="width:48%" onclick="resetSystem()">RESET</button>
        </div>
    </main>

    <script>
        let xp = parseInt(localStorage.getItem('sl_xp')) || 0;
        let lvl = parseInt(localStorage.getItem('sl_lvl')) || 1;
        let str = parseInt(localStorage.getItem('sl_str')) || 10;
        let int = parseInt(localStorage.getItem('sl_int')) || 10;

        function updateUI() {
            document.getElementById('lvl-display').innerText = `LV. ${lvl < 10 ? '0'+lvl : lvl}`;
            document.getElementById('xp-bar').style.width = xp + "%";
            document.getElementById('xp-num').innerText = xp;
            document.getElementById('str-val').innerText = str;
            document.getElementById('int-val').innerText = int;
            localStorage.setItem('sl_xp', xp);
            localStorage.setItem('sl_lvl', lvl);
            localStorage.setItem('sl_str', str);
            localStorage.setItem('sl_int', int);
        }

        function addXP(amt, type) {
            xp += amt;
            if(type === 'str') str++;
            if(type === 'int') int++;
            if(xp >= 100) { xp -= 100; lvl++; alert("LEVEL UP!"); }
            updateUI();
        }

        function resetSystem() { if(confirm("Reiniciar progresso?")) { localStorage.clear(); location.reload(); } }

        // Boot Sequence
        window.onload = () => {
            updateUI();
            setTimeout(() => { document.getElementById('boot-text').innerText = "ACESSO CONCEDIDO"; document.getElementById('boot-text').style.color = "#00ff00"; }, 1500);
            setTimeout(() => { 
                document.getElementById('boot').style.opacity = '0';
                document.getElementById('hud').style.display = 'flex';
                setTimeout(() => document.getElementById('hud').style.opacity = '1', 100);
                setTimeout(() => document.getElementById('boot').style.display = 'none', 1000);
            }, 3000);
        };
    </script>
</body>
</html>

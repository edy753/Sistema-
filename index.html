<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX SYSTEM: SOLO LEVELING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rank-e: #00d4ff; --rank-d: #00ff88; --rank-c: #ffd700;
            --rank-b: #ff8800; --rank-a: #a333ff; --rank-s: #ff0044;
            --bg: #050505; --accent: var(--rank-e);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; transition: 0.8s ease; }
        
        /* Efeito de Scanline e Atmosfera */
        body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; }

        .app-container { display: flex; flex-direction: column; height: 100%; padding: 20px; z-index: 10; position: relative; }
        
        /* Header Holográfico */
        header { border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 25px; filter: drop-shadow(0 0 10px var(--accent)); }
        .player-name { font-family: 'Orbitron'; font-size: 1.4rem; letter-spacing: 2px; text-transform: uppercase; }
        .rank-tag { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--accent); font-weight: bold; }

        /* Barra de XP Infinita e Acumulativa */
        .xp-wrapper { margin: 15px 0; }
        .xp-label { display: flex; justify-content: space-between; font-size: 0.7rem; font-family: 'Orbitron'; margin-bottom: 5px; color: #888; }
        .xp-bar-outer { background: rgba(255,255,255,0.05); height: 12px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative; }
        .xp-bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), #fff); width: 0%; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 0 0 15px var(--accent); }

        /* Grid de Status e Biometria */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 4px; position: relative; overflow: hidden; }
        .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent); opacity: 0.5; }
        .stat-label { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-family: 'Orbitron'; font-size: 1.3rem; margin-top: 5px; }

        /* Caixa de Mensagens do Sistema (IA Mode) */
        .system-msg { background: rgba(0,0,0,0.8); border: 1px solid var(--accent); padding: 10px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 20px; line-height: 1.4; color: var(--accent); font-style: italic; animation: flicker 2s infinite; }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* Missões Diárias Estilizadas */
        .mission-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .mission-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .mission-card:active { background: rgba(255,255,255,0.08); }
        .mission-info h4 { font-size: 0.8rem; color: var(--accent); margin-bottom: 3px; }
        .mission-info p { font-size: 0.75rem; color: #aaa; }
        
        /* Botões */
        .btn-action { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; text-transform: uppercase; border-radius: 2px; }

        /* Modais */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        
        /* AP Button */
        .ap-badge { background: var(--rank-d); color: black; font-size: 0.5rem; padding: 2px 5px; border-radius: 2px; margin-left: 10px; animation: bounce 1s infinite; display: none; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    </style>
</head>
<body id="body">

    <div id="setup" class="overlay">
        <h1 style="font-family: 'Orbitron'; color: var(--rank-e); margin-bottom: 40px; letter-spacing: 5px;">SYSTEM INITIALIZATION</h1>
        <input type="text" id="nameIn" placeholder="IDENTIFICAÇÃO DO PLAYER" style="width:100%; background: #111; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 10px; font-family: 'Orbitron'; font-size: 0.8rem; border-radius: 4px;">
        <div style="display:flex; gap:10px; margin-bottom: 20px;">
            <input type="number" id="hIn" placeholder="ALTURA (cm)" style="width:50%; background: #111; border: 1px solid #333; color: white; padding: 15px; font-family: 'Orbitron'; font-size: 0.7rem; border-radius: 4px;">
            <input type="number" id="wIn" placeholder="PESO (kg)" style="width:50%; background: #111; border: 1px solid #333; color: white; padding: 15px; font-family: 'Orbitron'; font-size: 0.7rem; border-radius: 4px;">
        </div>
        <button class="btn-action" onclick="initSystem()" style="width: 100%; padding: 20px; font-size: 0.9rem;">CONCLUIR DESPERTAR</button>
    </div>

    <div class="app-container">
        <header>
            <div class="player-name" id="pName">JIN-WOO</div>
            <div style="display:flex; align-items:center;">
                <span class="rank-tag" id="pRank">RANK E</span>
                <span id="apBadge" class="ap-badge">AP DISPONÍVEL</span>
            </div>
        </header>

        <div class="xp-wrapper">
            <div class="xp-label">
                <span id="pLvl">LEVEL 01</span>
                <span id="pXpText">0 / 100 XP ACUMULADO</span>
            </div>
            <div class="xp-bar-outer">
                <div class="xp-bar-inner" id="xpBar"></div>
            </div>
        </div>

        <div class="system-msg" id="sysMsg">
            SISTEMA: Aguardando entrada de dados para otimização de caça...
        </div>

        <div class="status-grid">
            <div class="stat-card" onclick="distributeAP('str')">
                <div class="stat-label">Força Muscular</div>
                <div class="stat-val" id="pStr">10.0</div>
            </div>
            <div class="stat-card" onclick="distributeAP('int')">
                <div class="stat-label">Capacidade Intelectual</div>
                <div class="stat-val" id="pInt">10.0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Índice de Massa (IMC)</div>
                <div class="stat-val" id="pImc">0.0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ouro Acumulado</div>
                <div class="stat-val" id="pGold" style="color:var(--gold)">0G</div>
            </div>
        </div>

        <div class="section-title">Missões de Evolução Diária</div>
        <div class="mission-list" id="mList"></div>

        <div style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn-action" onclick="hardReset()" style="border-color:#222; color:#444;">REINICIAR</button>
            <button class="btn-action" onclick="usePotion()" id="potBtn" style="border-color:var(--gold); color:var(--gold); display:none;">USAR POÇÃO XP</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('APEX_DATA')) || null;

        const MISSIONS = [
            { id: 1, t: 'Treino de Força', d: '15 min de calistenia/pesos', xp: 30, type: 'str' },
            { id: 2, t: 'Expansão Mental', d: '20 min de leitura técnica', xp: 30, type: 'int' },
            { id: 3, t: 'Vitalidade Hídrica', d: 'Consumir 2.5L de água', xp: 20, type: 'str' },
            { id: 4, t: 'Ordem de Caçador', d: 'Organizar ambiente de foco', xp: 20, type: 'int' }
        ];

        function initSystem() {
            const name = document.getElementById('nameIn').value;
            const h = parseFloat(document.getElementById('hIn').value);
            const w = parseFloat(document.getElementById('wIn').value);
            if(!name || !h || !w) return alert("SISTEMA: Dados incompletos.");

            db = {
                name, h, w, xp: 0, str: 10, int: 10, gold: 0, ap: 0, pots: 0,
                done: [], last: new Date().toLocaleDateString()
            };
            save(); render();
        }

        function save() { localStorage.setItem('APEX_DATA', JSON.stringify(db)); }

        function getLvl(xp) {
            let l = 1, next = 100, total = 100;
            while(xp >= total) { l++; next = l * 100; total += next; }
            const rankData = [
                { l: 50, r: 'RANK S', c: '#ff0044' }, { l: 40, r: 'RANK A', c: '#a333ff' },
                { l: 30, r: 'RANK B', c: '#ff8800' }, { l: 20, r: 'RANK C', c: '#ffd700' },
                { l: 10, r: 'RANK D', c: '#00ff88' }, { l: 0, r: 'RANK E', c: '#00d4ff' }
            ];
            const rank = rankData.find(r => l >= r.l);
            return { l, currentXp: xp, nextGoal: total, rank: rank.r, color: rank.c };
        }

        function render() {
            if(!db) return document.getElementById('setup').style.display = 'flex';
            document.getElementById('setup').style.display = 'none';

            const p = getLvl(db.xp);
            document.body.style.setProperty('--accent', p.color);
            document.getElementById('pName').innerText = db.name;
            document.getElementById('pRank').innerText = p.rank;
            document.getElementById('pLvl').innerText = `LEVEL ${p.l.toString().padStart(2, '0')}`;
            document.getElementById('pXpText').innerText = `${Math.floor(db.xp)} / ${p.nextGoal} XP TOTAL`;
            document.getElementById('xpBar').style.width = (db.xp / p.nextGoal * 100) + "%";
            document.getElementById('pStr').innerText = db.str.toFixed(1);
            document.getElementById('pInt').innerText = db.int.toFixed(1);
            document.getElementById('pGold').innerText = db.gold + "G";
            
            const imc = (db.w / ((db.h/100)**2)).toFixed(1);
            document.getElementById('pImc').innerText = imc;
            
            // IA Message
            const msgs = imc > 25 ? "O sistema sugere foco em agilidade. Seu IMC está elevado." : "Condição física otimizada para o Rank atual.";
            document.getElementById('sysMsg').innerText = `SISTEMA: ${msgs}`;

            // AP Badge
            document.getElementById('apBadge').style.display = db.ap > 0 ? 'inline-block' : 'none';
            document.getElementById('potBtn').style.display = db.pots > 0 ? 'block' : 'none';

            // Missions
            const mCont = document.getElementById('mList');
            mCont.innerHTML = "";
            const avail = MISSIONS.filter(m => !db.done.includes(m.id));
            if(avail.length === 0) mCont.innerHTML = `<p style="color:#444; text-align:center; padding:20px;">Ciclo diário concluído. Descanse.</p>`;
            avail.forEach(m => {
                mCont.innerHTML += `
                    <div class="mission-card">
                        <div class="mission-info"><h4>${m.t}</h4><p>${m.d}</p></div>
                        <button class="btn-action" onclick="complete(${m.id}, ${m.xp}, '${m.type}')">OK</button>
                    </div>`;
            });
        }

        function complete(id, xp, type) {
            const oldL = getLvl(db.xp).l;
            db.xp += xp; db.gold += 150; db.done.push(id);
            const newL = getLvl(db.xp).l;
            if(newL > oldL) { db.ap += (newL - oldL) * 3; db.pots++; }
            save(); render();
        }

        function distributeAP(type) {
            if(db.ap > 0) { db.ap--; db[type] += 1; save(); render(); }
        }

        function usePotion() { if(db.pots > 0) { db.pots--; db.xp += 100; save(); render(); } }

        function checkReset() {
            const today = new Date().toLocaleDateString();
            if(db && db.last !== today) {
                if(db.done.length < MISSIONS.length) db.xp = Math.max(0, db.xp - 200);
                db.done = []; db.last = today; save();
            }
        }

        function hardReset() { if(confirm("APAGAR TODOS OS DADOS DO SISTEMA?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => { checkReset(); render(); };
    </script>
</body>
</html>

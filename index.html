<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>SOLO LEVELING: REAL LIFE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --panel: rgba(20, 20, 30, 0.9); --purple: #a333ff; --red: #ff0044; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: white; height: 100vh; overflow: hidden; }
        
        /* Telas */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; padding: 20px; transition: 0.5s; overflow-y: auto; }
        .active { display: flex; }

        /* Setup Inicial */
        #setup-screen { z-index: 1000; background: var(--dark); justify-content: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--neon); font-family: 'Orbitron'; margin-bottom: 5px; }
        input { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; font-size: 1rem; }
        input:focus { border-color: var(--neon); outline: none; }

        /* HUD Principal */
        header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 15px; }
        .xp-container { background: #111; height: 8px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; overflow: hidden; }
        #xp-bar { background: linear-gradient(90deg, var(--neon), var(--purple)); height: 100%; width: 0%; transition: 0.8s; }

        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .card { background: var(--panel); border-left: 2px solid var(--neon); padding: 10px; border-radius: 4px; }
        .card .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .card .val { font-size: 1.2rem; font-weight: bold; font-family: 'Orbitron'; }

        .analysis-box { background: rgba(0, 212, 255, 0.1); border: 1px solid var(--neon); padding: 10px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 15px; line-height: 1.4; }

        .quest-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 212, 255, 0.1); padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--neon); color: var(--neon); padding: 10px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; border-radius: 3px; }
        
        #penalty-alert { background: rgba(255, 0, 68, 0.2); border: 1px solid var(--red); color: var(--red); padding: 10px; margin-bottom: 15px; font-size: 0.8rem; display: none; text-align: center; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen">
        <h2 style="font-family: 'Orbitron'; color: var(--neon); margin-bottom: 20px; text-align: center;">REGISTRO DE DESPERTADO</h2>
        <div class="input-group">
            <label>NOME DO JOGADOR</label>
            <input type="text" id="in-name" placeholder="Ex: Jin-Woo">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="input-group">
                <label>ALTURA (cm)</label>
                <input type="number" id="in-height" placeholder="180">
            </div>
            <div class="input-group">
                <label>PESO (kg)</label>
                <input type="number" id="in-weight" placeholder="75">
            </div>
        </div>
        <button class="btn" onclick="completeSetup()" style="width: 100%; margin-top: 10px; padding: 15px;">INICIAR DESPERTAR</button>
    </div>

    <div id="main-screen" class="screen">
        <div id="penalty-alert">⚠️ PUNIÇÃO: VOCÊ FALHOU NAS MISSÕES DE ONTEM!</div>
        
        <header>
            <div style="font-family: 'Orbitron'; font-size: 1.1rem;"><span id="display-name">---</span> <span id="lvl-display" style="float:right; color:var(--neon)">LV. 01</span></div>
            <div id="imc-tag" style="font-size: 0.6rem; color: var(--neon); margin-top: 5px;">ANALISANDO CONDIÇÃO FÍSICA...</div>
            <div class="xp-container"><div id="xp-bar"></div></div>
        </header>

        <div class="analysis-box" id="analysis-text">
            O sistema está calibrando seus dados biométricos para gerar as missões diárias.
        </div>

        <div class="status-grid">
            <div class="card"><div class="label">Força</div><div class="val" id="str-val">10</div></div>
            <div class="card"><div class="label">Inteligência</div><div class="val" id="int-val">10</div></div>
        </div>

        <div id="quest-container">
            </div>
    </div>

    <script>
        let stats = JSON.parse(localStorage.getItem('sl_data')) || null;

        function completeSetup() {
            const name = document.getElementById('in-name').value;
            const h = parseFloat(document.getElementById('in-height').value) / 100;
            const w = parseFloat(document.getElementById('in-weight').value);

            if(!name || !h || !w) return alert("Preencha todos os dados!");

            const imc = (w / (h * h)).toFixed(1);
            let condicao = "";
            if(imc < 18.5) condicao = "ABAIXO DO PESO";
            else if(imc < 25) condicao = "PESO IDEAL";
            else condicao = "SOBREPESO";

            stats = {
                name: name, height: h, weight: w, imc: imc, cond: condicao,
                lvl: 1, xp: 0, str: 10, int: 10, gold: 0,
                lastQuestDate: new Date().toLocaleDateString(),
                penaltyActive: false
            };
            
            saveAndRefres();
        }

        function saveAndRefres() {
            localStorage.setItem('sl_data', JSON.stringify(stats));
            location.reload();
        }

        function checkPenalty() {
            const hoje = new Date().toLocaleDateString();
            if (stats.lastQuestDate !== hoje) {
                stats.penaltyActive = true;
                stats.xp = Math.max(0, stats.xp - 50);
                stats.lastQuestDate = hoje; // Reset para hoje
                localStorage.setItem('sl_data', JSON.stringify(stats));
            }
        }

        function init() {
            if (!stats) {
                document.getElementById('setup-screen').classList.add('active');
            } else {
                checkPenalty();
                document.getElementById('main-screen').classList.add('active');
                renderHUD();
            }
        }

        function renderHUD() {
            document.getElementById('display-name').innerText = stats.name.toUpperCase();
            document.getElementById('lvl-display').innerText = `LV. ${stats.lvl}`;
            document.getElementById('imc-tag').innerText = `CONDIÇÃO: ${stats.cond}`;
            document.getElementById('str-val').innerText = stats.str;
            document.getElementById('int-val').innerText = stats.int;
            document.getElementById('xp-bar').style.width = (stats.xp % 100) + "%";
            
            if(stats.penaltyActive) document.getElementById('penalty-alert').style.display = 'block';

            document.getElementById('analysis-text').innerText = `Seu IMC é ${stats.imc}. O sistema recomenda foco em ${stats.cond === 'SOBREPESO' ? 'Vigor e Exercícios' : 'Fortalecimento Muscular'}.`;

            renderQuests();
        }

        function renderQuests() {
            const qBox = document.getElementById('quest-container');
            qBox.innerHTML = `
                <p style="font-family:Orbitron; font-size:0.7rem; margin-bottom:10px; color:var(--neon);">MISSÕES DIÁRIAS</p>
                <div class="quest-box">
                    <div><div style="font-size:0.6rem; color:var(--neon)">TREINO</div><div style="font-size:0.8rem">10 Minutos de Cardio</div></div>
                    <button class="btn" onclick="addXP(30, 'str')">CONCLUIR</button>
                </div>
            `;
        }

        function addXP(amt, type) {
            stats.xp += amt;
            if(type === 'str') stats.str++;
            if(stats.xp >= 100) { stats.lvl++; stats.xp = 0; alert("LEVEL UP!"); }
            stats.penaltyActive = false; // Cumpriu a missão, remove aviso de punição
            localStorage.setItem('sl_data', JSON.stringify(stats));
            renderHUD();
        }

        window.onload = init;
    </script>
</body>
</html>

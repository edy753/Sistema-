<script>
    const terminal = document.getElementById('terminal');

    function log(msg) {
        const time = new Date().toLocaleTimeString();
        terminal.innerHTML += `<br>[${time}] ${msg}`;
        terminal.scrollTop = terminal.scrollHeight;
    }

    function addCommand(label, action) {
        const grid = document.getElementById('command-grid');
        const btn = document.createElement('button');
        btn.className = 'nexus-btn';
        btn.innerText = label;
        btn.onclick = () => {
            log(`EXECUTANDO: ${label}`);
            action();
        };
        grid.appendChild(btn);
    }

    // --- COMANDOS CONFIGURADOS POR MIM (NEXUS CORE) ---

    // 1. MULTI-SEARCH (Abre pesquisas em série)
    addCommand("Pesquisa Global", () => {
        const termo = prompt("O que deseja buscar em múltiplas fontes?");
        if(termo) {
            window.open(`https://www.google.com/search?q=${termo}`, '_blank');
            log(`Busca iniciada para: ${termo}`);
        }
    });

    // 2. TEXT TRANSFORM (Limpeza de formatação para colagem)
    addCommand("Limpar Texto", async () => {
        try {
            const text = await navigator.clipboard.readText();
            const cleanText = text.replace(/\s+/g, ' ').trim();
            await navigator.clipboard.writeText(cleanText);
            log("Clipboard limpo e normalizado.");
        } catch (err) {
            log("Erro: Necessário permissão de Clipboard.");
        }
    });

    // 3. WORKSPACE (Abre suas ferramentas de uma vez)
    addCommand("Abrir Workspace", () => {
        // Exemplo de links profissionais - pode ser alterado
        const links = ['https://gmail.com', 'https://web.whatsapp.com'];
        links.forEach(link => window.open(link, '_blank'));
        log("Ferramentas de trabalho abertas.");
    });

    // 4. SYSTEM INFO (Diagnóstico do Dispositivo)
    addCommand("Status Sistema", () => {
        const info = `Resolução: ${window.innerWidth}x${window.innerHeight} | Bateria: Verificando...`;
        log(info);
        if ('getBattery' in navigator) {
            navigator.getBattery().then(batt => {
                log(`Bateria: ${Math.round(batt.level * 100)}% - ${batt.charging ? 'Carregando' : 'Descarregando'}`);
            });
        }
    });

</script>

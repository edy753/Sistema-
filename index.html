<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SOLO LEVELING: APEX PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00d4ff; --bg: #030305; --card: rgba(15, 15, 25, 0.7);
            --gold: #ffd700; --red: #ff0044; --green: #00ff88;
            --accent: var(--neon); --glare: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg); color: white; height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; transition: background 1s ease;
        }

        /* Efeito de Fundo Animado */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, var(--accent), transparent 60%);
            opacity: 0.15; z-index: -1; filter: blur(100px); animation: pulseBg 8s infinite alternate;
        }
        @keyframes pulseBg { from { opacity: 0.1; } to { opacity: 0.25; } }

        .app-shell { flex: 1; display: flex; flex-direction: column; padding: 25px; z-index: 10; overflow-y: auto; }

        /* HUD Premium */
        header { 
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 25px;
        }
        .player-info h1 { font-family: 'Orbitron'; font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; text-transform: uppercase; }
        .rank-badge { 
            font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 700; 
            color: var(--accent); border: 1px solid var(--accent); padding: 3px 10px; border-radius: 100px;
            box-shadow: 0 0 15px var(--accent); text-shadow: 0 0 5px var(--accent);
        }

        /* Barra de XP Infinita */
        .xp-section { margin-bottom: 30px; }
        .xp-meta { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'Orbitron'; font-size: 0.65rem; color: #aaa; }
        .progress-track { 
            background: rgba(255,255,255,0.03); height: 6px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        }
        .progress-fill { 
            height: 100%; background: linear-gradient(90deg, var(--accent), #fff); 
            width: 0%; transition: 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px var(--accent);
        }

        /* Grid de Status Minimalista */
        .stats-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-box { 
            background: var(--card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glare); padding: 15px; border-radius: 12px; position: relative;
        }
        .stat-box label { font-size: 0.6rem; color: #666; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .stat-box span { display: block; font-family: 'Orbitron'; font-size: 1.4rem; margin-top: 5px; font-weight: 700; }
        .ap-dot { 
            position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; 
            background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); display: none;
        }

        /* Missões Modernas */
        .missions-title { font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .missions-title::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        .mission-item { 
            background: var(--card); border: 1px solid var(--glare); padding: 18px; 
            border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .m-text h4 { font-size: 0.9rem; margin-bottom: 4px; color: #fff; }
        .m-text p { font-size: 0.75rem; color: #666; }

        .btn-check { 
            width: 45px; height: 45px; border-radius: 12px; border: 1px solid var(--accent); 
            background: transparent; color: var(--accent); font-weight: bold; cursor: pointer;
            transition: 0.3s; font-size: 0.6rem;
        }
        .btn-check:active { background: var(--accent); color: #000; transform: scale(0.9); }

        /* Setup Overlay */
        #setup-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: none; flex-direction: column; justify-content: center; padding: 40px; 
        }
        input { 
            background: #0d0d12; border: 1px solid #1a1a25; padding: 18px; color: #fff; 
            border-radius: 12px; margin-bottom: 12px; font-family: 'Orbitron'; font-size: 0.8rem;
        }
        input:focus { border-color: var(--neon); outline: none; }
    </style>
</head>
<body>

    <div class="ambient-bg" id="amb"></div>

    <div id="setup-overlay">
        <h2 style="font-family:'Orbitron'; color:var(--neon); margin-bottom:40px; text-align:center;">SYSTEM DESPERTAR</h2>
        <input type="text" id="setup-name" placeholder="NOME DO JOGADOR">
        <input type="number" id="setup-h" placeholder="ALTURA (cm)">
        <input type="number" id="setup-w" placeholder="PESO (kg)">
        <button class="btn-check" style="width:100%; height:60px;" onclick="startSystem()">INICIAR CONTRATO</button>
    </div>

    <div class="app-shell">
        <header>
            <div class="player-info">
                <span class="rank-tag" id="r-tag">RANK E</span>
                <h1 id="p-name">---</h1>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 0.5rem; color: #555;">OURO ACUMULADO</div>
                <div style="font-family:'Orbitron'; color:var(--gold); font-size: 1.2rem;" id="p-gold">0</div>
            </div>
        </header>

        <div class="xp-section">
            <div class="xp-meta">
                <span id="p-lvl">LEVEL 1</span>
                <span id="p-xp-info">0 / 100 XP TOTAL</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="xp-bar"></div>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-box" onclick="levelStat('str')">
                <div class="ap-dot" id="ap-str"></div>
                <label>Fisicalidade</label>
                <span id="s-str">10.0</span>
            </div>
            <div class="stat-box" onclick="levelStat('int')">
                <div class="ap-dot" id="ap-int"></div>
                <label>Cognição</label>
                <span id="s-int">10.0</span>
            </div>
        </div>

        <div class="missions-title">OBJETIVOS DIÁRIOS</div>
        <div id="m-list" style="flex:1;"></div>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-check" style="flex:1; height:50px; border-color:#222; color:#444;" onclick="hardReset()">RESET</button>
            <button class="btn-action" style="flex:2; height:50px; background:var(--accent); color:black; border:none; border-radius:12px; font-family:'Orbitron'; font-size:0.7rem; font-weight:900;" onclick="alert('Dungeon System: Conclua as missões para liberar portais.')">EXPLORAR DUNGEON</button>
        </div>
    </div>

    <script>
        let player = JSON.parse(localStorage.getItem('SL_APEX_PRO')) || null;

        const QUESTS = [
            { id: 1, t: 'Treino de Força', d: '20 min de exercício intenso', xp: 40 },
            { id: 2, t: 'Estudo Focado', d: '30 min de leitura ou curso', xp: 40 },
            { id: 3, t: 'Vitalidade', d: 'Hidratação e Alimentação Limpa', xp: 20 }
        ];

        function startSystem() {
            const n = document.getElementById('setup-name').value;
            const h = document.getElementById('setup-h').value;
            const w = document.getElementById('setup-w').value;
            if(!n || !h || !w) return;

            player = {
                name: n, xp: 0, gold: 0, str: 10, int: 10, ap: 0,
                done: [], last: new Date().toLocaleDateString()
            };
            save(); render();
        }

        function getProg(xp) {
            let l = 1, next = 100, total = 100;
            while(xp >= total) { l++; next = l * 100; total += next; }
            const colors = { 0:'#00d4ff', 10:'#00ff88', 20:'#ffd700', 30:'#ff8800', 40:'#a333ff', 50:'#ff0044' };
            let activeColor = colors[0];
            Object.keys(colors).forEach(lvl => { if(l >= lvl) activeColor = colors[lvl]; });
            let rank = l < 10 ? 'E' : l < 20 ? 'D' : l < 30 ? 'C' : l < 40 ? 'B' : l < 50 ? 'A' : 'S';
            return { l, totalGoal: total, color: activeColor, rank: `RANK ${rank}` };
        }

        function save() { localStorage.setItem('SL_APEX_PRO', JSON.stringify(player)); }

        function complete(id, xp) {
            const oldL = getProg(player.xp).l;
            player.xp += xp; player.gold += 150; player.done.push(id);
            const newL = getProg(player.xp).l;
            if(newL > oldL) player.ap += (newL - oldL) * 3;
            save(); render();
        }

        function levelStat(type) {
            if(player.ap > 0) { player.ap--; player[type] += 1; save(); render(); }
        }

        function render() {
            if(!player) { document.getElementById('setup-overlay').style.display = 'flex'; return; }
            document.getElementById('setup-overlay').style.display = 'none';

            const p = getProg(player.xp);
            document.documentElement.style.setProperty('--accent', p.color);
            document.getElementById('p-name').innerText = player.name.toUpperCase();
            document.getElementById('r-tag').innerText = p.rank;
            document.getElementById('p-lvl').innerText = `LEVEL ${p.l}`;
            document.getElementById('p-xp-info').innerText = `${Math.floor(player.xp)} / ${p.totalGoal} XP TOTAL`;
            document.getElementById('xp-bar').style.width = (player.xp / p.totalGoal * 100) + "%";
            document.getElementById('p-gold').innerText = player.gold;
            document.getElementById('s-str').innerText = player.str.toFixed(1);
            document.getElementById('s-int').innerText = player.int.toFixed(1);

            document.getElementById('ap-str').style.display = player.ap > 0 ? 'block' : 'none';
            document.getElementById('ap-int').style.display = player.ap > 0 ? 'block' : 'none';

            const mList = document.getElementById('m-list');
            mList.innerHTML = "";
            QUESTS.filter(q => !player.done.includes(q.id)).forEach(q => {
                mList.innerHTML += `
                    <div class="mission-item">
                        <div class="m-text"><h4>${q.t}</h4><p>${q.d}</p></div>
                        <button class="btn-check" onclick="complete(${q.id}, ${q.xp})">OK</button>
                    </div>`;
            });
        }

        function hardReset() { if(confirm("REINICIAR SISTEMA?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            if(player && player.last !== new Date().toLocaleDateString()) {
                if(player.done.length < QUESTS.length) player.xp = Math.max(0, player.xp - 200);
                player.done = []; player.last = new Date().toLocaleDateString(); save();
            }
            render();
        };
    </script>
</body>
</html>

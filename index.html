<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>SOLO LEVELING: RECOVERY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --panel: rgba(20, 20, 30, 0.9); --purple: #a333ff; --red: #ff0044; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; padding: 15px; overflow-y: auto; background: var(--dark); }
        .active { display: flex; }
        header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 15px; }
        .xp-container { background: #111; height: 8px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; overflow: hidden; }
        #xp-bar { background: linear-gradient(90deg, var(--neon), var(--purple)); height: 100%; width: 0%; transition: 0.8s; }
        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .card { background: var(--panel); border-left: 2px solid var(--neon); padding: 10px; border-radius: 4px; }
        .card .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .card .val { font-size: 1.2rem; font-weight: bold; font-family: 'Orbitron'; }
        .quest-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 212, 255, 0.1); padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--neon); color: var(--neon); padding: 10px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; border-radius: 3px; }
        input { width:100%; padding:15px; background:#111; border:1px solid #333; color:white; margin-bottom:10px; border-radius:5px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen" style="justify-content: center;">
        <h2 style="font-family: 'Orbitron'; color: var(--neon); text-align: center; margin-bottom: 20px;">SISTEMA DE RECUPERAÇÃO</h2>
        <input type="text" id="in-name" placeholder="NOME DO PLAYER">
        <input type="number" id="in-height" placeholder="ALTURA (cm)">
        <input type="number" id="in-weight" placeholder="PESO (kg)">
        <button class="btn" onclick="completeSetup()" style="padding:20px;">DESPERTAR SISTEMA</button>
    </div>

    <main id="main-screen" class="screen">
        <header>
            <div style="font-family: 'Orbitron'; font-size: 1.1rem;"><span id="display-name">---</span> <span id="lvl-display" style="float:right; color:var(--neon)">LV. 01</span></div>
            <div class="xp-container"><div id="xp-bar"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 0.6rem;">
                <span id="xp-text">0 / 100 XP</span>
                <span>GOLD: <span id="gold-val" style="color: var(--gold);">0</span>G</span>
            </div>
        </header>
        <div class="status-grid">
            <div class="card"><div class="label">Força</div><div class="val" id="str-val">10</div></div>
            <div class="card"><div class="label">Mente</div><div class="val" id="int-val">10</div></div>
        </div>
        <div id="quest-container"></div>
        <button class="btn" onclick="hardReset()" style="margin-top:auto; border-color:var(--red); color:var(--red); opacity:0.5;">RESET TOTAL DO SISTEMA</button>
    </main>

    <script>
        const DAILY_QUESTS = [
            { id: 'q1', title: 'CORPO', desc: '15 min de treino físico', xp: 30 },
            { id: 'q2', title: 'MENTE', desc: '15 min de estudo focado', xp: 30 },
            { id: 'q3', title: 'HÁBITO', desc: 'Beber 2L de água hoje', xp: 20 },
            { id: 'q4', title: 'FOCO', desc: 'Arrumar o teu ambiente', xp: 20 }
        ];

        let stats = null;
        try {
            stats = JSON.parse(localStorage.getItem('sl_data'));
        } catch(e) {
            console.error("Erro nos dados, resetando...");
            localStorage.clear();
        }

        function completeSetup() {
            const name = document.getElementById('in-name').value;
            if(!name) return alert("Insira o nome!");
            stats = {
                name: name, lvl: 1, xp: 0, str: 10, int: 10, gold: 0,
                completedToday: [], lastDate: new Date().toLocaleDateString()
            };
            save();
            render();
        }

        function hardReset() {
            if(confirm("Deseja apagar todo o seu progresso?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function save() { localStorage.setItem('sl_data', JSON.stringify(stats)); }

        function render() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if (!stats) {
                document.getElementById('setup-screen').classList.add('active');
                return;
            }
            document.getElementById('main-screen').classList.add('active');
            
            const required = stats.lvl <= 5 ? 100 : 200;
            document.getElementById('display-name').innerText = stats.name.toUpperCase();
            document.getElementById('lvl-display').innerText = `LV. ${stats.lvl}`;
            document.getElementById('xp-bar').style.width = (stats.xp / required * 100) + "%";
            document.getElementById('xp-text').innerText = `${stats.xp} / ${required} XP`;
            document.getElementById('gold-val').innerText = stats.gold;
            document.getElementById('str-val').innerText = stats.str;
            document.getElementById('int-val').innerText = stats.int;

            const qContainer = document.getElementById('quest-container');
            qContainer.innerHTML = "";
            const available = DAILY_QUESTS.filter(q => !stats.completedToday.includes(q.id));

            available.forEach(q => {
                const div = document.createElement('div');
                div.className = 'quest-box';
                div.innerHTML = `<div><div style="font-size:0.5rem; color:var(--neon);">${q.title}</div><div>${q.desc}</div></div>
                                 <button class="btn" onclick="completeQuest('${q.id}', ${q.xp})">+${q.xp}XP</button>`;
                qContainer.appendChild(div);
            });
        }

        function completeQuest(id, xp) {
            stats.completedToday.push(id);
            stats.xp += xp;
            stats.gold += 100;
            const required = stats.lvl <= 5 ? 100 : 200;
            if(stats.xp >= required) { stats.xp -= required; stats.lvl++; alert("LEVEL UP!"); }
            save();
            render();
        }

        window.onload = render;
    </script>
</body>
</html>

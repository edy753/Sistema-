<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>SISTEMA SOLO LEVELING: XP TOTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00d4ff; --dark: #050505; --panel: rgba(20, 20, 30, 0.9); 
            --purple: #a333ff; --red: #ff0044; --gold: #ffd700; --green: #00ff88;
            --rank-color: var(--neon);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: 0.5s; }
        
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; padding: 15px; overflow-y: auto; background: var(--dark); z-index: 10; }
        .active { display: flex; }

        header { border-bottom: 2px solid var(--rank-color); padding-bottom: 10px; margin-bottom: 15px; flex-shrink: 0; transition: 0.5s; }
        .xp-container { background: #111; height: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; overflow: hidden; }
        #xp-bar { background: linear-gradient(90deg, var(--rank-color), var(--purple)); height: 100%; width: 0%; transition: 1s cubic-bezier(0.15, 0.85, 0.45, 1); }

        .biometric-bar { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 4px; font-size: 0.7rem; margin-bottom: 15px; display: flex; justify-content: space-between; font-family: 'Orbitron'; }

        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .card { background: var(--panel); border-left: 2px solid var(--rank-color); padding: 10px; border-radius: 4px; position: relative; transition: 0.5s; }
        .card .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .card .val { font-size: 1.2rem; font-weight: bold; font-family: 'Orbitron'; }
        .ap-btn { position: absolute; top: 5px; right: 5px; background: var(--green); color: black; border: none; border-radius: 3px; font-size: 0.5rem; padding: 2px 6px; font-weight: bold; cursor: pointer; display: none; }

        .section-title { font-family: 'Orbitron'; font-size: 0.7rem; margin: 20px 0 10px; color: var(--rank-color); border-left: 2px solid var(--rank-color); padding-left: 8px; text-transform: uppercase; transition: 0.5s; }
        
        .quest-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--rank-color); color: var(--rank-color); padding: 8px 12px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; border-radius: 3px; transition: 0.3s; }
        .btn:active { background: var(--rank-color); color: black; }

        .battle-log { background: #000; border: 1px solid #222; padding: 10px; border-radius: 5px; height: 100px; overflow-y: auto; font-size: 0.6rem; color: #666; font-family: monospace; margin-top: 10px; }

        #dungeon-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #0a0a1a, #000); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        input { width:100%; padding:15px; background:#111; border:1px solid #333; color:white; margin-bottom:10px; border-radius:5px; font-family:'Orbitron'; }
    </style>
</head>
<body>

    <div id="dungeon-overlay">
        <h2 style="font-family:'Orbitron'; color:var(--purple); margin-bottom:10px;">INSTÂNCIA ATIVA</h2>
        <div id="dungeon-timer" style="font-family:'Orbitron'; font-size:3.5rem; color:var(--purple);">00:00</div>
        <p id="dungeon-task" style="font-size:1.1rem; letter-spacing:1px; margin:20px 0; color:white;"></p>
        <div style="color:var(--red); font-size:0.6rem; font-family:'Orbitron';">SISTEMA: NÃO MINIMIZE O APLICATIVO!</div>
    </div>

    <div id="setup-screen" class="screen" style="justify-content: center;">
        <h2 style="font-family:'Orbitron'; color:var(--neon); text-align:center; margin-bottom:30px;">REGISTRO DE DESPERTADO</h2>
        <input type="text" id="in-name" placeholder="NOME DO PLAYER">
        <input type="number" id="in-height" placeholder="ALTURA (cm)">
        <input type="number" id="in-weight" placeholder="PESO (kg)">
        <button class="btn" onclick="completeSetup()" style="width:100%; padding:20px;">DESPERTAR</button>
    </div>

    <main id="main-screen" class="screen">
        <header id="main-header">
            <div style="font-family:'Orbitron'; font-size:1.1rem;"><span id="display-name">---</span> <span id="rank-display" style="float:right; color:var(--rank-color)">RANK E</span></div>
            <div id="lvl-tag" style="font-size: 0.6rem; color: #888; margin-top: 4px;">LEVEL 1</div>
            <div class="xp-container"><div id="xp-bar"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:0.65rem; font-family:'Orbitron'; color:#888;">
                <span id="xp-text">0 / 100 XP</span>
                <span>GOLD: <span id="gold-val" style="color:var(--gold)">0</span>G</span>
            </div>
        </header>

        <div class="biometric-bar">
            <span>IMC: <span id="imc-val" style="color:var(--rank-color)">--</span></span>
            <span id="imc-status">--</span>
        </div>

        <div class="status-grid">
            <div class="card"><div class="label">Força</div><div class="val" id="str-val">10.0</div><button class="ap-btn" onclick="distributeAP('str')">+ UP</button></div>
            <div class="card"><div class="label">Mente</div><div class="val" id="int-val">10.0</div><button class="ap-btn" onclick="distributeAP('int')">+ UP</button></div>
        </div>

        <div class="section-title">Missões Diárias</div>
        <div id="quest-container"></div>

        <div class="section-title">Log de Batalha</div>
        <div class="battle-log" id="battle-log"></div>

        <div class="section-title">Portais & Mercado</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" style="border-color:var(--gold); color:var(--gold);" onclick="buyXP()">POÇÃO XP (500G)</button>
            <button class="btn" style="border-color:var(--purple); color:var(--purple);" onclick="enterDungeon('Foco Profundo', 20)">DUNGEON (20m)</button>
        </div>

        <button onclick="hardReset()" style="margin-top:40px; background:none; border:none; color:#222; font-size:0.5rem; text-decoration:underline; width:100%;">APAGAR TUDO</button>
    </main>

    <script>
        const QUEST_DB = [
            { id: 'q1', title: 'FÍSICO', desc: '15 min de atividade', xp: 25 },
            { id: 'q2', title: 'ESTUDO', desc: '15 min de leitura', xp: 25 },
            { id: 'q3', title: 'SAÚDE', desc: 'Beber 2L de água', xp: 25 },
            { id: 'q4', title: 'DISCIPLINA', desc: 'Organizar ambiente', xp: 25 }
        ];

        let stats = JSON.parse(localStorage.getItem('sl_data_final_fix')) || null;

        function completeSetup() {
            const n = document.getElementById('in-name').value;
            const h = parseFloat(document.getElementById('in-height').value) / 100;
            const w = parseFloat(document.getElementById('in-weight').value);
            if(!n || !h || !w) return;
            stats = { name: n, h, w, imc: (w/(h*h)).toFixed(1), xp: 0, str: 10, int: 10, gold: 0, ap: 0, completed: [], last: new Date().toLocaleDateString(), logs: [] };
            addLog("O Despertar começou.");
            save(); render();
        }

        function getProgress(xp) {
            let level = 1;
            let xpNext = 100;
            let totalNeeded = 100;
            
            while (xp >= totalNeeded) {
                level++;
                xpNext = level * 100;
                totalNeeded += xpNext;
            }
            
            let prevTotal = totalNeeded - xpNext;
            let rank = "E", color = "#00d4ff";
            if(level >= 10) { rank = "D"; color = "#00ff88"; }
            if(level >= 20) { rank = "C"; color = "#ffd700"; }
            if(level >= 30) { rank = "B"; color = "#ff8800"; }
            if(level >= 40) { rank = "A"; color = "#a333ff"; }
            if(level >= 50) { rank = "S"; color = "#ff0044"; }

            return { level, xpInLevel: xp, nextGoal: totalNeeded, rank, color };
        }

        function save() { localStorage.setItem('sl_data_final_fix', JSON.stringify(stats)); }

        function addLog(msg) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            stats.logs.unshift(`[${time}] ${msg}`);
            if(stats.logs.length > 5) stats.logs.pop();
        }

        function addXP(amt) {
            const oldLvl = getProgress(stats.xp).level;
            stats.xp += amt;
            const newLvl = getProgress(stats.xp).level;
            if(newLvl > oldLvl) { stats.ap += 3; addLog(`Level Up! Nível ${newLvl}`); }
            save(); render();
        }

        function render() {
            if(!stats) { document.getElementById('setup-screen').classList.add('active'); return; }
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('main-screen').classList.add('active');

            const p = getProgress(stats.xp);
            document.body.style.setProperty('--rank-color', p.color);
            document.getElementById('display-name').innerText = stats.name.toUpperCase();
            document.getElementById('rank-display').innerText = `RANK ${p.rank}`;
            document.getElementById('lvl-tag').innerText = `LEVEL ${p.level}`;
            document.getElementById('gold-val').innerText = stats.gold;
            document.getElementById('str-val').innerText = stats.str;
            document.getElementById('int-val').innerText = stats.int;
            document.getElementById('imc-val').innerText = stats.imc;
            document.getElementById('imc-status').innerText = stats.imc < 25 ? "NORMAL" : "ALERTA";

            // CORREÇÃO VISUAL DA BARRA: XP TOTAL / META TOTAL
            document.getElementById('xp-bar').style.width = (stats.xp / p.nextGoal * 100) + "%";
            document.getElementById('xp-text').innerText = `${stats.xp} / ${p.nextGoal} XP TOTAL`;

            document.querySelectorAll('.ap-btn').forEach(b => b.style.display = stats.ap > 0 ? 'block' : 'none');
            document.getElementById('battle-log').innerHTML = stats.logs.map(l => `<div>> ${l}</div>`).join('');

            const qCont = document.getElementById('quest-container');
            qCont.innerHTML = "";
            QUEST_DB.filter(q => !stats.completed.includes(q.id)).forEach(q => {
                qCont.innerHTML += `<div class="quest-box">
                    <div><div style="font-size:0.5rem; color:var(--rank-color);">${q.title}</div><div style="font-size:0.8rem;">${q.desc}</div></div>
                    <button class="btn" onclick="stats.completed.push('${q.id}'); stats.gold+=100; addXP(${q.xp});">OK</button>
                </div>`;
            });
        }

        function buyXP() { if(stats.gold >= 500) { stats.gold -= 500; addXP(50); addLog("Poção usada."); } else alert("Gold insuficiente."); }
        function hardReset() { if(confirm("Apagar tudo?")) { localStorage.clear(); location.reload(); } }
        window.onload = render;
    </script>
</body>
</html>

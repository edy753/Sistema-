// --- CONFIGURAÇÃO PWA ---

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log("Modo Offline indisponível"));
}

// --- DADOS EXPANDIDOS ---
let stats = JSON.parse(localStorage.getItem('sl_data')) || null;
let dungeonTimer = null;

function renderQuests() {
    const qBox = document.getElementById('quest-container');
    
    // Gerador de Missão Baseado no IMC
    let treinoSugerido = stats.cond === "SOBREPESO" ? "15 Minutos de Cardio (Queima de Gordura)" : "15 Minutos de Calistenia (Ganho de Massa)";
    
    qBox.innerHTML = `
        <p style="font-family:Orbitron; font-size:0.7rem; margin-bottom:10px; color:var(--neon);">MISSÕES DIÁRIAS</p>
        <div class="quest-box">
            <div><div style="color:var(--neon); font-size:0.6rem;">DIÁRIA</div><div style="font-size:0.8rem">${treinoSugerido}</div></div>
            <button class="btn" onclick="addXP(40, 'str')">CONCLUIR</button>
        </div>

        <p style="font-family:Orbitron; font-size:0.7rem; margin:15px 0 10px; color:var(--purple);">INSTÂNCIAS (DUNGEONS)</p>
        <div class="quest-box" style="border-color: var(--purple); background: rgba(163, 51, 255, 0.05);">
            <div><div style="color:var(--purple); font-size:0.6rem;">RANK E</div><div id="dungeon-status" style="font-size:0.8rem">Portal de Foco (20 min)</div></div>
            <button class="btn" id="dungeon-btn" style="border-color:var(--purple); color:var(--purple)" onclick="startDungeon(20)">ENTRAR</button>
        </div>
    `;
}

function startDungeon(minutes) {
    let seconds = minutes * 60;
    const btn = document.getElementById('dungeon-btn');
    const status = document.getElementById('dungeon-status');
    
    btn.disabled = true;
    btn.style.opacity = "0.5";
    
    // Bloqueio de saída: Se o usuário mudar de aba, o sistema detecta (Visiblity API)
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && dungeonTimer) {
            clearInterval(dungeonTimer);
            alert("VOCÊ ABANDONOU A DUNGEON! PUNIÇÃO APLICADA.");
            stats.xp = Math.max(0, stats.xp - 100);
            saveAndRefres();
        }
    });

    dungeonTimer = setInterval(() => {
        seconds--;
        let min = Math.floor(seconds / 60);
        let sec = seconds % 60;
        status.innerText = `TEMPO RESTANTE: ${min}:${sec < 10 ? '0'+sec : sec}`;
        status.style.color = "var(--red)";

        if (seconds <= 0) {
            clearInterval(dungeonTimer);
            dungeonTimer = null;
            alert("DUNGEON CONCLUÍDA! RECOMPENSA: +150 XP e +500 Gold");
            stats.xp += 150;
            stats.gold += 500;
            saveAndRefres();
        }
    }, 1000);
}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA SOLO LEVELING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --panel: rgba(20, 20, 30, 0.9); --purple: #a333ff; --red: #ff0044; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #boot { position: fixed; inset: 0; background: black; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .scanner { width: 120px; height: 120px; border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #hud { padding: 20px; flex: 1; display: none; flex-direction: column; opacity: 0; transition: 1s; }
        header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 15px; text-shadow: 0 0 10px var(--neon); }
        
        .xp-bg { background: #111; height: 6px; margin: 10px 0; border-radius: 3px; border: 1px solid #222; }
        #xp-bar { background: var(--neon); height: 100%; width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--neon); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: var(--panel); border-left: 3px solid var(--neon); padding: 12px; border-radius: 4px; }
        .val { font-size: 1.5rem; font-weight: bold; font-family: 'Orbitron'; }

        .quest-box { background: rgba(20, 20, 30, 0.8); border: 1px solid rgba(0, 212, 255, 0.2); padding: 12px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 10px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; border-radius: 3px; }

        /* Estilo da Punição */
        .penalty-msg { color: var(--red); font-weight: bold; text-shadow: 0 0 5px var(--red); font-size: 0.7rem; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="boot" onclick="startSystem()">
        <div class="scanner"></div>
        <p id="boot-text" style="margin-top:20px; color:var(--neon); font-family:Orbitron; letter-spacing:2px; font-size: 0.7rem;">SISTEMA AGUARDANDO PLAYER...</p>
    </div>

    <main id="hud">
        <div id="penalty-ui" class="penalty-msg">⚠️ AVISO: VOCÊ FALHOU NO TREINO DIÁRIO! XP REDUZIDO.</div>
        
        <header>
            <div style="font-family: 'Orbitron'; font-size: 1rem;">JIN-WOO <span id="lvl-display" style="float:right; color:var(--neon)">LV. 01</span></div>
            <div id="player-title" style="font-size: 0.6rem; background: rgba(0,212,255,0.1); padding: 2px 5px; display: inline-block; margin-top:5px;">O MAIS FRACO</div>
            <div class="xp-bg"><div id="xp-bar"></div></div>
            <div style="font-size:0.6rem; color:#888;">OURO: <span id="gold-val" style="color: gold;">0</span>G</div>
        </header>

        <div class="grid">
            <div class="card"><div style="font-size:0.6rem; color:#888;">FORÇA</div><div class="val" id="str-val">10</div></div>
            <div class="card"><div style="font-size:0.6rem; color:#888;">INTEL.</div><div class="val" id="int-val">10</div></div>
        </div>

        <p style="font-family:Orbitron; font-size:0.7rem; margin-bottom:10px; color:var(--neon);">MISSÕES DISPONÍVEIS</p>
        
        <div class="quest-box">
            <div><div style="font-size:0.6rem; color:var(--neon)">QUEST</div><div style="font-size:0.8rem">Fortalecimento</div></div>
            <button class="btn" onclick="addXP(25, 'str')">+25 XP</button>
        </div>

        <div class="quest-box" style="border-color: var(--purple)">
            <div><div style="font-size:0.6rem; color:var(--purple)">QUEST</div><div style="font-size:0.8rem">Meditação</div></div>
            <button class="btn" onclick="addXP(30, 'int')" style="border-color:var(--purple); color:var(--purple)">+30 XP</button>
        </div>

        <div style="margin-top:auto; display:flex; justify-content:space-between; padding-bottom:10px">
            <button class="btn" style="width:100%" onclick="showInventory()">VER INVENTÁRIO (RECOMPENSAS)</button>
        </div>
    </main>

    <script>
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        function playSound(f, t, d) {
            initAudio(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination); o.type = t;
            o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.start(); o.stop(audioCtx.currentTime + d);
        }

        // Dados do Sistema
        let xp = parseInt(localStorage.getItem('sl_xp')) || 0;
        let lvl = parseInt(localStorage.getItem('sl_lvl')) || 1;
        let str = parseInt(localStorage.getItem('sl_str')) || 10;
        let int = parseInt(localStorage.getItem('sl_int')) || 10;
        let gold = parseInt(localStorage.getItem('sl_gold')) || 0;
        let lastVisit = localStorage.getItem('sl_last_visit') || Date.now();

        function checkPenalty() {
            const now = Date.now();
            const diff = now - lastVisit;
            const hours24 = 24 * 60 * 60 * 1000;

            if (diff > hours24) {
                document.getElementById('penalty-ui').style.display = 'block';
                xp = Math.max(0, xp - 50); // Punição: perde 50 XP
                playSound(100, 'sawtooth', 0.5); // Som de erro
            }
            localStorage.setItem('sl_last_visit', now);
        }

        function updateUI() {
            document.getElementById('lvl-display').innerText = `LV. ${lvl}`;
            document.getElementById('xp-bar').style.width = xp + "%";
            document.getElementById('str-val').innerText = str;
            document.getElementById('int-val').innerText = int;
            document.getElementById('gold-val').innerText = gold;
            
            localStorage.setItem('sl_xp', xp); localStorage.setItem('sl_lvl', lvl);
            localStorage.setItem('sl_str', str); localStorage.setItem('sl_int', int);
            localStorage.setItem('sl_gold', gold);
        }

        function addXP(amt, type) {
            playSound(880, 'sine', 0.1);
            xp += amt;
            if(type === 'str') str++; else int++;
            if(xp >= 100) {
                xp = 0; lvl++; gold += 500; // RECOMPENSA: +500 Gold ao subir nível
                playSound(440, 'square', 0.5);
                alert("LEVEL UP! RECOMPENSA: +500G E CHAVE DE BAÚ ADQUIRIDA.");
            }
            localStorage.setItem('sl_last_visit', Date.now()); // Reset do tempo de punição
            updateUI();
        }

        function showInventory() {
            alert(`INVENTÁRIO DO JOGADOR:\n- Ouro: ${gold}G\n- Poção de Vitalidade (0)\n- Chaves de Portal (0)`);
        }

        function startSystem() {
            initAudio(); playSound(660, 'sine', 0.2);
            document.getElementById('boot-text').innerText = "ACESSO CONCEDIDO";
            checkPenalty();
            setTimeout(() => {
                document.getElementById('boot').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
                setTimeout(() => document.getElementById('hud').style.opacity = '1', 50);
            }, 1000);
        }

        window.onload = updateUI;
    </script>
</body>
</html>
